<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget</title>
  <link rel = "stylesheet" href="../css/budget.css">

</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">TRIPLANNER</div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="country.html">Planner</a>
      <a href="itinerary.html">Itinerary</a>
      <a href="bookings.html">Bookings</a>
      <a href="budget.html" class="active">Budget</a>
    </div>
    <div class="nav-right">
      <input type="text" placeholder="Search" />
      <span style="font-size:20px;cursor:pointer;">🔔</span>
      <span style="font-size:20px;cursor:pointer;">👤</span>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <div class="main-box">
    <h1>Trip Budget 💰</h1>
    <p class="subtitle">Set your budget and track every rupee you spend</p>

    <!-- SET BUDGET -->
    <div class="card">
      <h2>⚙️ Set Your Trip Budget</h2>
      <div class="input-row">
        <div class="input-group">
          <label>Trip Name</label>
          <input type="text" id="tripName" placeholder="e.g. Japan Trip" />
        </div>
        <div class="input-group">
          <label>Total Budget (₹)</label>
          <input type="number" id="budgetInput" placeholder="e.g. 150000" min="0" />
        </div>
      </div>
      <button class="btn-set" onclick="setBudget()">Set Budget</button>
    </div>

    <!-- SUMMARY -->
    <div class="summary-grid">
      <div class="summary-box">
        <div class="lbl">Total Budget</div>
        <div class="amt" id="totalDisplay">₹0</div>
      </div>
      <div class="summary-box">
        <div class="lbl">Total Spent</div>
        <div class="amt" id="spentDisplay">₹0</div>
      </div>
      <div class="summary-box remaining" id="remainingBox">
        <div class="lbl">Remaining</div>
        <div class="amt" id="remainingDisplay">₹0</div>
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-wrap">
      <h2>📊 Budget Used</h2>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <div class="progress-label" id="progressLabel">0% used</div>
    </div>

    <!-- ADD EXPENSE -->
    <div class="card">
      <h2>➕ Add an Expense</h2>
      <div class="expense-form">
        <input type="text" id="expName" placeholder="Expense name (e.g. Hotel)" />
        <input type="number" id="expAmount" placeholder="Amount (₹)" min="0" />
        <select id="expCategory">
          <option value="">Category</option>
          <option value="Hotel">🏨 Hotel</option>
          <option value="Flight">✈️ Flight</option>
          <option value="Food">🍜 Food</option>
          <option value="Transport">🚖 Transport</option>
          <option value="Activities">🎡 Activities</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Medical">💊 Medical</option>
          <option value="Other">📦 Other</option>
        </select>
        <button class="btn-add" onclick="addExpense()">Add</button>
      </div>

      <div class="expense-list" id="expenseList">
        <div class="empty-state">
          <div class="emoji">🧾</div>
          <div>No expenses added yet.<br/>Start adding to track your spending!</div>
        </div>
      </div>
    </div>

  </div>

<script src="../budget.js"></script>


</body>
</html>
